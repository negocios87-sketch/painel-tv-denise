<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Ritmo do Dia — Time Denise</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #08080A;
    --panel: #131315;
    --panel-2: #1B1B1E;
    --line: #2C2C2F;
    --line-soft: #1F1F22;
    --gold: #C9A24B;
    --gold-bright: #E8C878;
    --white: #F1F1EE;
    --dim: #85858A;
    --mid: #B4B4B6;
    --neg: #B15B4A;

    /* toques de cor por squad — dessaturados de propósito, não neon */
    --sniper: #6E8BAE;
    --elite: #B15B4A;
    --olympus: #5C9578;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{
    background:var(--bg); color:var(--white);
    font-family:'Barlow Condensed', 'Arial Narrow', sans-serif;
    width:100%; height:100%; overflow:hidden;
  }
  .num{font-family:'JetBrains Mono', monospace; font-variant-numeric: tabular-nums;}
  #app{
    display:flex; flex-direction:column; gap:16px;
    padding:22px 30px; height:100vh;
    background:
      radial-gradient(ellipse 900px 500px at 15% -10%, rgba(201,162,75,0.10), transparent 60%),
      var(--bg);
  }

  /* ── Header ─────────────────────────── */
  .header{
    display:flex; justify-content:space-between; align-items:flex-end;
    border-bottom:1px solid var(--line);
    padding-bottom:16px;
  }
  .header .brand{ display:flex; align-items:center; gap:18px; }
  .header .logo{ height:42px; width:auto; object-fit:contain; }
  .header .eyebrow{
    font-size:12px; letter-spacing:4px; color:var(--gold); font-weight:600;
  }
  .header h1{
    font-size:26px; font-weight:700; letter-spacing:0.5px; margin-top:3px;
    color:var(--white);
    text-shadow:0 0 24px rgba(201,162,75,0.25);
  }
  .header .meta{ text-align:right; font-size:13px; color:var(--dim); line-height:1.6; }
  .header .meta b{ color:var(--mid); font-weight:600; }

  /* ── Top summary cards ─────────────────── */
  .top-cards{ display:grid; grid-template-columns:repeat(3,1fr); gap:1px; background:var(--line); border:1px solid var(--line); }
  .card{
    background:var(--panel); padding:16px 20px; position:relative;
  }
  .card::before{
    content:""; position:absolute; top:0; left:0; width:100%; height:2px;
    background:var(--line-soft);
  }
  .card.on::before{ background:var(--gold); box-shadow:0 0 10px rgba(201,162,75,0.6); }
  .card.off::before{ background:var(--neg); box-shadow:0 0 10px rgba(177,91,74,0.5); }
  .card .label{ font-size:12px; color:var(--dim); text-transform:uppercase; letter-spacing:1.5px; font-weight:600; }
  .card .value{ font-size:32px; font-weight:700; margin-top:6px; color:var(--white); }
  .card .sub{ font-size:12px; color:var(--dim); margin-top:6px; }
  .pos{ color:var(--gold-bright); text-shadow:0 0 10px rgba(201,162,75,0.35); }
  .neg{ color:var(--neg); }

  /* ── Squad cards ────────────────────────── */
  .squad-row{ display:grid; grid-template-columns:repeat(3,1fr); gap:1px; background:var(--line); border:1px solid var(--line); }
  .squad-card{
    background:var(--panel); padding:18px 22px; position:relative;
  }
  .squad-card::before{
    content:""; position:absolute; top:0; left:0; width:100%; height:3px;
    background:var(--accent, var(--gold));
  }
  .squad-card .sq-name{
    font-size:13px; font-weight:700; letter-spacing:2.5px; text-transform:uppercase;
    color:var(--accent, var(--gold));
  }
  .squad-card .sq-pct{ font-size:40px; font-weight:700; margin:4px 0 12px; color:var(--white); }
  .squad-card .row{
    display:flex; justify-content:space-between; font-size:13px;
    padding:6px 0; border-top:1px solid var(--line-soft);
  }
  .squad-card .row span:first-child{ color:var(--dim); }
  .ritmo-track{
    position:relative; height:3px; background:var(--panel-2);
    margin:10px 0 6px; overflow:hidden;
  }
  .ritmo-fill{ position:absolute; top:0; left:0; height:100%; background:var(--accent, var(--gold)); }

  /* ── Top3 lists ─────────────────────────── */
  .lists{ display:grid; grid-template-columns:1fr 1fr; gap:20px; flex:1; min-height:0; }
  .list-block h2{
    font-size:12px; letter-spacing:2.5px; color:var(--dim); text-transform:uppercase;
    margin-bottom:10px; font-weight:600; border-bottom:1px solid var(--line); padding-bottom:8px;
  }
  .list-items{ display:flex; flex-direction:column; gap:1px; background:var(--line); border:1px solid var(--line); }
  .item{
    display:flex; align-items:center; gap:14px; position:relative;
    background:var(--panel); padding:12px 18px;
  }
  .item .rank{
    font-family:'JetBrains Mono', monospace; font-size:13px; font-weight:700;
    color:var(--gold); width:22px; flex-shrink:0;
  }
  .item .avatar-wrap{ position:relative; width:44px; height:44px; flex-shrink:0; }
  .item .avatar{
    position:absolute; top:0; left:0;
    width:44px; height:44px; border-radius:50%; object-fit:cover;
    background:var(--panel-2); display:block;
    box-shadow:0 0 0 2px var(--accent, var(--gold)), 0 0 14px rgba(201,162,75,0.25);
  }
  .item .avatar-fallback{
    position:absolute; top:0; left:0;
    width:44px; height:44px; border-radius:50%; display:none;
    align-items:center; justify-content:center; font-weight:700; font-size:14px;
    background:var(--panel-2); color:var(--dim);
    box-shadow:0 0 0 2px var(--accent, var(--gold));
  }
  .item .info{ flex:1; }
  .item .name{ font-size:16px; font-weight:600; color:var(--white); }
  .item .squad-tag{
    font-size:10px; color:var(--accent, var(--dim)); text-transform:uppercase;
    letter-spacing:1.5px; margin-top:1px; font-weight:600;
  }
  .item .pct{ font-size:23px; font-weight:700; text-align:right; color:var(--gold-bright); }
  .item .delta{ font-size:11px; text-align:right; margin-top:2px; }

  .loading, .error{
    display:flex; align-items:center; justify-content:center;
    height:100vh; color:var(--dim); font-size:18px; letter-spacing:0.5px;
  }
</style>
</head>
<body>
<div id="app">
  <div class="loading" id="loading">Carregando painel…</div>
</div>

<script>
const API_URL = "/api/painel-tv";
const REFRESH_MS = 60000; // 60s — ajuste aqui se quiser outro intervalo
const FOTO_BASE = "https://raw.githubusercontent.com/negocios87-sketch/fotos_time_comercial/main";
const LOGO_URL = "https://raw.githubusercontent.com/negocios87-sketch/fotos_time_comercial/main/logo_board.png";
const PHOTO_EXTS = ["jpg", "jpeg", "png"];
const SQUAD_ACCENT = { "Sniper": "var(--sniper)", "Elite": "var(--elite)", "Olympus": "var(--olympus)" };

function fmtMoney(v){
  if (v === null || v === undefined) return "—";
  const abs = Math.abs(v);
  const sign = v < 0 ? "-" : "";
  if (abs >= 1000) return `${sign}R$ ${(abs/1000).toFixed(1)}k`;
  return `${sign}R$ ${abs.toFixed(0)}`;
}
function fmtPct(v){ return (v === null || v === undefined) ? "—" : `${v.toFixed(1)}%`; }
function fmtNum(v, d=1){ return (v === null || v === undefined) ? "—" : v.toFixed(d); }
function fmtInt(v){ return (v === null || v === undefined) ? "—" : String(Math.round(v)); }
function cls(v){ return v >= 0 ? "pos" : "neg"; }
function arrow(v){ return v >= 0 ? "▲" : "▼"; }
function iniciais(nome){
  return (nome || "").trim().split(/\s+/).slice(0,2).map(p => p[0]).join("").toUpperCase();
}

// Tenta .jpg → .jpeg → .png antes de cair pras iniciais.
// Exposta em window pq é chamada via onerror inline no HTML gerado.
window.handlePhotoError = function(img){
  const idx = parseInt(img.dataset.extIdx || "0", 10) + 1;
  if (idx < PHOTO_EXTS.length){
    img.dataset.extIdx = String(idx);
    img.src = `${FOTO_BASE}/${img.dataset.name}.${PHOTO_EXTS[idx]}`;
  } else {
    img.style.display = "none";
    img.nextElementSibling.style.display = "flex";
  }
};

function avatarHTML(nome, accent){
  const encoded = encodeURIComponent(nome);
  const style = accent ? `style="--accent:${accent}"` : "";
  return `
    <div class="avatar-wrap" ${style}>
      <img class="avatar" data-name="${encoded}" data-ext-idx="0"
           src="${FOTO_BASE}/${encoded}.${PHOTO_EXTS[0]}" alt="${nome}"
           onerror="handlePhotoError(this)">
      <div class="avatar-fallback">${iniciais(nome)}</div>
    </div>`;
}

const MARCO_LABEL = "vs. checkpoint 40%";

function squadCardHTML(sq){
  const accent = SQUAD_ACCENT[sq.nome] || "var(--gold)";
  const isReuniao = sq.tipo === "reunioes";
  const fmtVal = isReuniao ? (v => fmtInt(v)) : fmtMoney;
  const fillPct = Math.max(0, Math.min(100, (sq.real_dia / (sq.meta_dia || 1)) * 100));
  return `
  <div class="squad-card" style="--accent:${accent}">
    <div class="sq-name">${sq.nome}</div>
    <div class="sq-pct">${fmtPct(sq.ating_pct)}</div>
    <div class="ritmo-track"><div class="ritmo-fill" style="width:${fillPct}%"></div></div>
    <div class="row"><span>${isReuniao ? "Meta reuniões/dia" : "Meta/dia"}</span><span class="num">${fmtVal(sq.meta_dia)}</span></div>
    <div class="row"><span>${isReuniao ? "Reuniões hoje" : "Vendido hoje"}</span><span class="num">${fmtVal(sq.real_dia)}</span></div>
    <div class="row"><span>Gap/dia</span><span class="num ${cls(sq.gap_dia)}">${fmtVal(sq.gap_dia)}</span></div>
    <div class="row"><span>${MARCO_LABEL}</span><span class="num">${fmtPct(sq.marco_pct)}</span></div>
  </div>`;
}

function closerItemHTML(c, i){
  const accent = SQUAD_ACCENT[c.squad] || "var(--gold)";
  return `
  <div class="item">
    <div class="rank">0${i+1}</div>
    ${avatarHTML(c.nome, accent)}
    <div class="info">
      <div class="name">${c.nome}</div>
      <div class="squad-tag" style="--accent:${accent}">${c.squad}</div>
    </div>
    <div>
      <div class="pct">${fmtPct(c.pct)}</div>
      <div class="delta num ${cls(c.delta_dia)}">${arrow(c.delta_dia)} ${fmtMoney(Math.abs(c.delta_dia))} vs meta hoje</div>
    </div>
  </div>`;
}

function sdrItemHTML(s, i){
  return `
  <div class="item">
    <div class="rank">0${i+1}</div>
    ${avatarHTML(s.nome, "var(--gold)")}
    <div class="info">
      <div class="name">${s.nome}</div>
      <div class="squad-tag">${s.lider || "—"}</div>
    </div>
    <div>
      <div class="pct">${fmtPct(s.pct)}</div>
      <div class="delta num ${cls(s.delta_dia)}">${arrow(s.delta_dia)} ${fmtNum(Math.abs(s.delta_dia))} vs meta hoje</div>
    </div>
  </div>`;
}

function render(d){
  const app = document.getElementById("app");
  app.innerHTML = `
    <div class="header">
      <div class="brand">
        <img class="logo" src="${LOGO_URL}" alt="Board Academy"
             onerror="this.style.display='none';">
        <div>
          <div class="eyebrow">TIME DENISE · TEMPO REAL</div>
          <h1>Ritmo do Dia</h1>
        </div>
      </div>
      <div class="meta">
        ${d.periodo.data} · ${d.periodo.du_dec} DU decorridos · ${d.periodo.du_rest} DU restantes<br>
        <b>Base: ${d.periodo.du_total} DU no mês</b>
      </div>
    </div>

    <div class="top-cards">
      <div class="card">
        <div class="label">Meta diária closers</div>
        <div class="value num">${fmtMoney(d.meta_diaria_closers)}</div>
        <div class="sub">com multiplicador</div>
      </div>
      <div class="card">
        <div class="label">Vendido hoje</div>
        <div class="value num">${fmtMoney(d.realizado_hoje_closers)}</div>
        <div class="sub">deals fechados hoje, calendário</div>
      </div>
      <div class="card ${d.gap_diario_simples >= 0 ? 'on' : 'off'}">
        <div class="label">Gap diário (hoje vs meta)</div>
        <div class="value num ${cls(d.gap_diario_simples)}">${fmtMoney(d.gap_diario_simples)}</div>
        <div class="sub">vendido hoje − meta do dia</div>
      </div>
      <div class="card">
        <div class="label">Meta reuniões/dia</div>
        <div class="value num">${fmtNum(d.meta_reunioes_dia,1)}/dia</div>
        <div class="sub">time Denise, SDRs</div>
      </div>
      <div class="card">
        <div class="label">Reuniões hoje</div>
        <div class="value num">${d.reunioes_hoje ?? "—"}</div>
        <div class="sub">validadas hoje, calendário</div>
      </div>
      <div class="card ${d.gap_reunioes >= 0 ? 'on' : 'off'}">
        <div class="label">Gap de reuniões hoje</div>
        <div class="value num ${cls(d.gap_reunioes)}">${fmtNum(d.gap_reunioes,1)}</div>
        <div class="sub">reuniões hoje − meta do dia</div>
      </div>
    </div>

    <div class="squad-row">
      ${d.squads.map(squadCardHTML).join("")}
    </div>

    <div class="lists">
      <div class="list-block">
        <h2>Top 3 Closers — % atingimento mensal</h2>
        <div class="list-items">${d.top_closers.map(closerItemHTML).join("")}</div>
      </div>
      <div class="list-block">
        <h2>Top 3 SDRs — % atingimento mensal</h2>
        <div class="list-items">${d.top_sdrs.map(sdrItemHTML).join("")}</div>
      </div>
    </div>
  `;
}

async function load(){
  try{
    const resp = await fetch(API_URL);
    if (!resp.ok) throw new Error("HTTP " + resp.status);
    const data = await resp.json();
    if (data.erro) throw new Error(data.erro);
    render(data);
  }catch(err){
    document.getElementById("app").innerHTML =
      `<div class="error">Erro ao carregar painel: ${err.message}. Tentando de novo em ${REFRESH_MS/1000}s…</div>`;
    console.error(err);
  }
}

load();
setInterval(load, REFRESH_MS);
</script>
</body>
</html>
