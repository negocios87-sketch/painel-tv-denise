<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Ritmo do Dia — Time Denise</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #08080A;
    --panel: #131315;
    --panel-2: #1B1B1E;
    --line: #2C2C2F;
    --line-soft: #1F1F22;
    --gold: #D4A947;
    --gold-bright: #F4C860;
    --white: #F1F1EE;
    --dim: #85858A;
    --mid: #B4B4B6;
    --neg: #C85F45;

    /* toques de cor por squad — visíveis, mas ainda longe de neon */
    --sniper: #4E85C4;
    --elite: #C85A3E;
    --olympus: #3FAE7A;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{
    background:var(--bg); color:var(--white);
    font-family:'Barlow Condensed', 'Arial Narrow', sans-serif;
    width:100%; height:100%; overflow:hidden;
  }
  .num{font-family:'JetBrains Mono', monospace; font-variant-numeric: tabular-nums;}
  #app{
    display:flex; flex-direction:column; gap:16px;
    padding:22px 30px; height:100vh;
    background:
      radial-gradient(ellipse 900px 500px at 15% -10%, rgba(201,162,75,0.10), transparent 60%),
      var(--bg);
  }

  /* ── Header ─────────────────────────── */
  .header{
    display:flex; justify-content:space-between; align-items:flex-end;
    border-bottom:1px solid var(--line);
    padding-bottom:16px;
  }
  .header .brand{ display:flex; align-items:center; gap:18px; }
  .header .logo{ height:42px; width:auto; object-fit:contain; }
  .header .eyebrow{
    font-size:12px; letter-spacing:4px; color:var(--gold); font-weight:600;
  }
  .header h1{
    font-size:26px; font-weight:700; letter-spacing:0.5px; margin-top:3px;
    color:var(--white);
    text-shadow:0 0 24px rgba(201,162,75,0.25);
  }
  .header .meta{ text-align:right; font-size:13px; color:var(--dim); line-height:1.6; }
  .header .meta b{ color:var(--mid); font-weight:600; }

  /* ── Top summary cards ─────────────────── */
  .top-cards{ display:grid; grid-template-columns:repeat(3,1fr); gap:1px; background:var(--line); border:1px solid var(--line); }
  .card{
    background:var(--panel); padding:16px 20px; position:relative;
  }
  .card::before{
    content:""; position:absolute; top:0; left:0; width:100%; height:2px;
    background:var(--line-soft);
  }
  .card.on::before{ background:var(--gold); box-shadow:0 0 12px rgba(212,169,71,0.75); }
  .card.off::before{ background:var(--neg); box-shadow:0 0 12px rgba(200,95,69,0.65); }
  .card .label{ font-size:12px; color:var(--dim); text-transform:uppercase; letter-spacing:1.5px; font-weight:600; }
  .card .value{ font-size:32px; font-weight:700; margin-top:6px; color:var(--white); }
  .card .sub{ font-size:12px; color:var(--dim); margin-top:6px; }
  .pos{ color:var(--gold-bright); text-shadow:0 0 12px rgba(212,169,71,0.5); }
  .neg{ color:var(--neg); text-shadow:0 0 10px rgba(200,95,69,0.35); }

  /* ── Squad cards ────────────────────────── */
  .squad-row{ display:grid; grid-template-columns:repeat(3,1fr); gap:1px; background:var(--line); border:1px solid var(--line); }
  .squad-card{
    background:var(--panel); padding:18px 22px; position:relative;
  }
  .squad-card::before{
    content:""; position:absolute; top:0; left:0; width:100%; height:3px;
    background:var(--accent, var(--gold));
  }
  .squad-card .sq-name{
    font-size:13px; font-weight:700; letter-spacing:2.5px; text-transform:uppercase;
    color:var(--accent, var(--gold));
  }
  .squad-card .sq-pct{ font-size:40px; font-weight:700; margin:4px 0 0; color:var(--white); }
  .squad-card .sq-caption{ font-size:11px; color:var(--dim); letter-spacing:0.5px; margin-bottom:10px; }
  .squad-card .row{
    display:flex; justify-content:space-between; font-size:13px;
    padding:6px 0; border-top:1px solid var(--line-soft);
  }
  .squad-card .row span:first-child{ color:var(--dim); }
  .ritmo-track{
    position:relative; height:3px; background:var(--panel-2);
    margin:10px 0 6px; overflow:hidden;
  }
  .ritmo-fill{ position:absolute; top:0; left:0; height:100%; background:var(--accent, var(--gold)); }

  /* ── Top3 lists ─────────────────────────── */
  .lists{ display:grid; grid-template-columns:1fr 1fr; gap:20px; flex:1; min-height:0; }
  .list-block h2{
    font-size:12px; letter-spacing:2.5px; color:var(--dim); text-transform:uppercase;
    margin-bottom:10px; font-weight:600; border-bottom:1px solid var(--line); padding-bottom:8px;
  }
  .list-items{ display:flex; flex-direction:column; gap:1px; background:var(--line); border:1px solid var(--line); }
  .item{
    display:flex; align-items:center; gap:14px; position:relative;
    background:var(--panel); padding:12px 18px;
  }
  .item .rank{
    font-family:'JetBrains Mono', monospace; font-size:13px; font-weight:700;
    color:var(--gold); width:22px; flex-shrink:0;
  }
  .avatar-wrap{ position:relative; background:var(--panel-2); border-radius:50%; flex-shrink:0; overflow:hidden; }
  .item .avatar-wrap{ width:44px; height:44px; }
  .avatar{
    position:absolute; top:0; left:0;
    width:44px; height:44px; border-radius:50%; object-fit:cover;
    background:var(--panel-2); display:block;
    box-shadow:0 0 0 2px var(--accent, var(--gold)), 0 0 16px rgba(212,169,71,0.35);
    opacity:0; transition:opacity 0.2s ease;
  }
  .avatar.loaded{ opacity:1; }
  .item .avatar-fallback{
    position:absolute; top:0; left:0;
    width:44px; height:44px; border-radius:50%; display:none;
    align-items:center; justify-content:center; font-weight:700; font-size:14px;
    background:var(--panel-2); color:var(--dim);
    box-shadow:0 0 0 2px var(--accent, var(--gold));
  }
  .item .info{ flex:1; }
  .item .name{ font-size:16px; font-weight:600; color:var(--white); }
  .item .squad-tag{
    font-size:10px; color:var(--accent, var(--dim)); text-transform:uppercase;
    letter-spacing:1.5px; margin-top:1px; font-weight:600;
  }
  .item .pct{ font-size:23px; font-weight:700; text-align:right; color:var(--gold-bright); }
  .item .pct-label{ font-size:10px; color:var(--dim); text-align:right; letter-spacing:0.5px; }
  .item .delta{ font-size:11px; text-align:right; margin-top:2px; }

  .loading, .error{
    display:flex; align-items:center; justify-content:center;
    height:100vh; color:var(--dim); font-size:18px; letter-spacing:0.5px;
  }

  /* ── Painel de Metas (página 2) ─────────── */
  .alert-banner{
    display:flex; align-items:center; gap:18px; padding:12px 20px;
    background:var(--panel); border-left:4px solid var(--neg);
  }
  .alert-banner.cor-laranja{ border-left-color:#C4923C; }
  .alert-banner.cor-verde{ border-left-color:var(--gold); }
  .alert-title{ font-size:15px; font-weight:800; letter-spacing:1px; color:var(--white); white-space:nowrap; }
  .alert-detail{ font-size:13px; color:var(--mid); }

  .metas-grid{ display:grid; grid-template-columns:1fr 1fr; gap:20px; flex:1; min-height:0; }
  .metas-col h2{
    font-size:12px; letter-spacing:2.5px; color:var(--dim); text-transform:uppercase;
    margin-bottom:8px; font-weight:600; border-bottom:1px solid var(--line); padding-bottom:8px;
  }
  .metas-table{ width:100%; border-collapse:collapse; background:var(--panel); border:1px solid var(--line); }
  .metas-table thead th{
    text-align:left; font-size:10px; color:var(--dim); text-transform:uppercase;
    letter-spacing:1px; font-weight:600; padding:6px 10px; border-bottom:1px solid var(--line);
  }
  .metas-table tbody tr{ border-bottom:1px solid var(--line-soft); }
  .metas-table tbody tr:last-child{ border-bottom:none; }
  .metas-table td{ padding:11px 12px; font-size:14px; vertical-align:middle; }
  .metas-table td.num{ font-family:'JetBrains Mono', monospace; text-align:right; }
  .metas-table td.dim-cell{ color:var(--dim); font-size:12px; }
  .cell-nome{ min-width:0; }
  .row-person{ display:flex; align-items:center; gap:12px; }
  .row-person .avatar-wrap{ width:38px; height:38px; border-radius:50%; overflow:hidden; }
  .row-person .avatar, .row-person .avatar-fallback{
    width:38px; height:38px; border-radius:50%;
    box-shadow:0 0 0 1px var(--accent, var(--gold)); font-size:12px;
  }
  .row-person span{ font-weight:600; color:var(--white); }

  .chip{
    display:inline-block; font-size:10px; font-weight:700; letter-spacing:0.5px;
    padding:2px 7px; border:1px solid var(--accent, var(--gold)); color:var(--accent, var(--gold));
  }

  .badge{
    display:inline-block; font-family:'JetBrains Mono', monospace; font-size:12px; font-weight:700;
    padding:3px 9px; border-radius:3px;
  }
  .badge.cor-verde{ background:rgba(212,169,71,0.15); color:var(--gold-bright); border:1px solid rgba(212,169,71,0.4); }
  .badge.cor-laranja{ background:rgba(196,146,60,0.15); color:#D9A85C; border:1px solid rgba(196,146,60,0.4); }
  .badge.cor-vermelho{ background:rgba(200,95,69,0.15); color:#E07A5F; border:1px solid rgba(200,95,69,0.4); }
  .venc{ font-size:9px; color:var(--neg); text-transform:uppercase; margin-left:6px; letter-spacing:0.5px; }

  .metas-footer{
    font-size:12px; color:var(--dim); padding:8px 10px; border:1px solid var(--line);
    border-top:none; background:var(--panel-2);
  }
  .metas-total{
    display:flex; justify-content:space-between; align-items:center;
    font-size:13px; font-weight:700; color:var(--white); padding:8px 10px;
    border:1px solid var(--gold); border-top:none; background:var(--panel-2);
  }

  .nav-dots{
    position:fixed; bottom:14px; right:20px; display:flex; gap:8px; z-index:50;
  }
  .nav-dots .dot{
    width:8px; height:8px; border-radius:50%; border:1px solid var(--line);
    background:var(--panel-2); cursor:pointer; padding:0;
  }
  .nav-dots .dot.active{ background:var(--gold); border-color:var(--gold); }
</style>
</head>
<body>
<div id="app">
  <div class="loading" id="loading">Carregando painel…</div>
</div>

<script>
const API_URL = "/api/painel-tv";
const REFRESH_MS = 60000; // 60s — ajuste aqui se quiser outro intervalo
const FOTO_BASE = "https://raw.githubusercontent.com/negocios87-sketch/fotos_time_comercial/main";
const LOGO_URL = "https://raw.githubusercontent.com/negocios87-sketch/fotos_time_comercial/main/logo_board.png";
const PHOTO_EXTS = ["jpg", "jpeg", "png"];
const SQUAD_ACCENT = { "Sniper": "var(--sniper)", "Elite": "var(--elite)", "Olympus": "var(--olympus)" };

function fmtMoney(v){
  if (v === null || v === undefined) return "—";
  const abs = Math.abs(v);
  const sign = v < 0 ? "-" : "";
  if (abs >= 1000) return `${sign}R$ ${(abs/1000).toFixed(1)}k`;
  return `${sign}R$ ${abs.toFixed(0)}`;
}
function fmtPct(v){ return (v === null || v === undefined) ? "—" : `${v.toFixed(1)}%`; }
function fmtNum(v, d=1){ return (v === null || v === undefined) ? "—" : v.toFixed(d); }
function fmtInt(v){ return (v === null || v === undefined) ? "—" : String(Math.round(v)); }
function fmtReu(v){ return (v === null || v === undefined) ? "—" : `${Math.round(v)}/dia`; }
function cls(v){ return v >= 0 ? "pos" : "neg"; }
function arrow(v){ return v >= 0 ? "▲" : "▼"; }
function iniciais(nome){
  return (nome || "").trim().split(/\s+/).slice(0,2).map(p => p[0]).join("").toUpperCase();
}

// Tenta .jpg → .jpeg → .png antes de cair pras iniciais.
// Exposta em window pq é chamada via onerror inline no HTML gerado.
window.handlePhotoError = function(img){
  const idx = parseInt(img.dataset.extIdx || "0", 10) + 1;
  if (idx < PHOTO_EXTS.length){
    img.dataset.extIdx = String(idx);
    img.src = `${FOTO_BASE}/${img.dataset.name}.${PHOTO_EXTS[idx]}`;
  } else {
    img.style.display = "none";
    img.nextElementSibling.style.display = "flex";
  }
};

function avatarHTML(nome, accent){
  const encoded = encodeURIComponent(nome);
  const style = accent ? `style="--accent:${accent}"` : "";
  return `
    <div class="avatar-wrap" ${style}>
      <img class="avatar" data-name="${encoded}" data-ext-idx="0"
           src="${FOTO_BASE}/${encoded}.${PHOTO_EXTS[0]}" alt="${nome}"
           onload="this.classList.add('loaded')"
           onerror="handlePhotoError(this)">
      <div class="avatar-fallback">${iniciais(nome)}</div>
    </div>`;
}

const MARCO_LABEL = "vs. checkpoint 40%";

function squadCardHTML(sq){
  const accent = SQUAD_ACCENT[sq.nome] || "var(--gold)";
  const isReuniao = sq.tipo === "reunioes";
  const fmtVal = isReuniao ? (v => fmtInt(v)) : fmtMoney;
  const fillPct = Math.max(0, Math.min(100, (sq.real_dia / (sq.meta_dia || 1)) * 100));
  return `
  <div class="squad-card" style="--accent:${accent}">
    <div class="sq-name">${sq.nome}</div>
    <div class="sq-pct">${fmtPct(sq.ating_pct)}</div>
    <div class="sq-caption">atingimento do mês</div>
    <div class="ritmo-track"><div class="ritmo-fill" style="width:${fillPct}%"></div></div>
    <div class="row"><span>${isReuniao ? "Meta reuniões/dia" : "Meta/dia"}</span><span class="num">${fmtVal(sq.meta_dia)}</span></div>
    <div class="row"><span>${isReuniao ? "Reuniões hoje" : "Vendido hoje"}</span><span class="num">${fmtVal(sq.real_dia)}</span></div>
    <div class="row"><span>Gap/dia</span><span class="num ${cls(sq.gap_dia)}">${fmtVal(sq.gap_dia)}</span></div>
    <div class="row"><span>${MARCO_LABEL}</span><span class="num">${fmtPct(sq.marco_pct)}</span></div>
  </div>`;
}

function closerItemHTML(c, i){
  const accent = SQUAD_ACCENT[c.squad] || "var(--gold)";
  return `
  <div class="item">
    <div class="rank">0${i+1}</div>
    ${avatarHTML(c.nome, accent)}
    <div class="info">
      <div class="name">${c.nome}</div>
      <div class="squad-tag" style="--accent:${accent}">${c.squad}</div>
    </div>
    <div>
      <div class="pct">${fmtPct(c.pct)}</div>
      <div class="pct-label">no mês</div>
      <div class="delta num ${cls(c.delta_dia)}">${arrow(c.delta_dia)} ${fmtMoney(Math.abs(c.delta_dia))} vs meta hoje</div>
    </div>
  </div>`;
}

function sdrItemHTML(s, i){
  return `
  <div class="item">
    <div class="rank">0${i+1}</div>
    ${avatarHTML(s.nome, "var(--gold)")}
    <div class="info">
      <div class="name">${s.nome}</div>
      <div class="squad-tag">${s.lider || "—"}</div>
    </div>
    <div>
      <div class="pct">${fmtPct(s.pct)}</div>
      <div class="pct-label">no mês</div>
      <div class="delta num ${cls(s.delta_dia)}">${arrow(s.delta_dia)} ${fmtNum(Math.abs(s.delta_dia))} vs meta hoje</div>
    </div>
  </div>`;
}

function renderRitmo(d){
  const app = document.getElementById("app");
  app.innerHTML = `
    <div class="header">
      <div class="brand">
        <img class="logo" src="${LOGO_URL}" alt="Board Academy"
             onerror="this.style.display='none';">
        <div>
          <div class="eyebrow">TIME DENISE · TEMPO REAL</div>
          <h1>Ritmo do Dia</h1>
        </div>
      </div>
      <div class="meta">
        ${d.periodo.data} · ${d.periodo.du_dec} DU decorridos · ${d.periodo.du_rest} DU restantes<br>
        <b>Base: ${d.periodo.du_total} DU no mês</b>
      </div>
    </div>

    <div class="top-cards">
      <div class="card">
        <div class="label">Meta diária closers</div>
        <div class="value num">${fmtMoney(d.meta_diaria_closers)}</div>
        <div class="sub">com multiplicador</div>
      </div>
      <div class="card">
        <div class="label">Vendido hoje</div>
        <div class="value num">${fmtMoney(d.realizado_hoje_closers)}</div>
        <div class="sub">deals fechados hoje, calendário</div>
      </div>
      <div class="card ${d.gap_diario_simples >= 0 ? 'on' : 'off'}">
        <div class="label">Gap diário (hoje vs meta)</div>
        <div class="value num ${cls(d.gap_diario_simples)}">${fmtMoney(d.gap_diario_simples)}</div>
        <div class="sub">vendido hoje − meta do dia</div>
      </div>
      <div class="card">
        <div class="label">Meta reuniões/dia</div>
        <div class="value num">${fmtReu(d.meta_reunioes_dia)}</div>
        <div class="sub">time Denise, SDRs · arredondado p/ cima</div>
      </div>
      <div class="card">
        <div class="label">Reuniões hoje</div>
        <div class="value num">${d.reunioes_hoje ?? "—"}</div>
        <div class="sub">validadas hoje, calendário</div>
      </div>
      <div class="card ${d.gap_reunioes >= 0 ? 'on' : 'off'}">
        <div class="label">Gap de reuniões hoje</div>
        <div class="value num ${cls(d.gap_reunioes)}">${fmtNum(d.gap_reunioes,1)}</div>
        <div class="sub">reuniões hoje − meta do dia</div>
      </div>
    </div>

    <div class="squad-row">
      ${d.squads.map(squadCardHTML).join("")}
    </div>

    <div class="lists">
      <div class="list-block">
        <h2>Top 3 Closers — % atingimento mensal</h2>
        <div class="list-items">${d.top_closers.map(closerItemHTML).join("")}</div>
      </div>
      <div class="list-block">
        <h2>Top 3 SDRs — % atingimento mensal</h2>
        <div class="list-items">${d.top_sdrs.map(sdrItemHTML).join("")}</div>
      </div>
    </div>
  `;
}

// ══════════════════════════════════════════════════════════
// PÁGINA 2 — Painel de Metas (checkpoints 40% dia 16 / 100% fim do mês)
// ══════════════════════════════════════════════════════════
const COR_MAP = { verde: "cor-verde", laranja: "cor-laranja", vermelho: "cor-vermelho" };

function badge40HTML(row, isReuniao){
  if (row.bateu40){
    return `<span class="badge cor-verde">✓ BATEU 40%</span>`;
  }
  const val = isReuniao ? `${row.req40}/dia` : fmtMoney(row.req40) + "/dia";
  const venc = row.vencido40 ? '<span class="venc">vencido</span>' : "";
  return `<span class="badge ${COR_MAP[row.cor]}">${val}</span>${venc}`;
}

function closerMetaRowHTML(c, i){
  const accent = SQUAD_ACCENT[{OLY:"Olympus",ELI:"Elite"}[c.squad]] || "var(--gold)";
  return `
  <tr>
    <td class="cell-nome">
      <div class="row-person">
        ${avatarHTML(c.nome, accent)}
        <span>${c.nome}</span>
      </div>
    </td>
    <td><span class="chip" style="--accent:${accent}">${c.squad}</span></td>
    <td class="num">${fmtMoney(c.realizado_multi)}</td>
    <td>${badge40HTML(c, false)}</td>
    <td class="num dim-cell">${fmtMoney(c.req100)}/dia</td>
  </tr>`;
}

function sdrMetaRowHTML(s, i){
  return `
  <tr>
    <td class="cell-nome">
      <div class="row-person">
        ${avatarHTML(s.nome, "var(--sniper)")}
        <span>${s.nome}</span>
      </div>
    </td>
    <td class="dim-cell">${s.lider}</td>
    <td class="num">${s.validadas}</td>
    <td>${badge40HTML(s, true)}</td>
    <td class="num dim-cell">${s.req100}/dia</td>
  </tr>`;
}

function renderMetas(d){
  const app = document.getElementById("app");
  const m = d.metas;
  if (!m){
    app.innerHTML = `<div class="error">Painel de Metas indisponível nesta atualização.</div>`;
    return;
  }
  const alerta = m.alerta_closers;
  const nivelClass = alerta ? (alerta.nivel === "critico" ? "cor-vermelho" : alerta.nivel === "alerta" ? "cor-laranja" : "cor-verde") : "";

  const gruposHTML = m.sdr_grupos_lider
    .filter(g => g.lider !== "Sem líder")
    .map(g => `TL ${g.lider}: ${g.req40}/dia`).join(" · ");
  const headHTML = m.sdr_head ? `Head ${m.sdr_head.nome}: ${m.sdr_head.req40}/dia` : "";

  app.innerHTML = `
    <div class="header">
      <div class="brand">
        <img class="logo" src="${LOGO_URL}" alt="Board Academy"
             onerror="this.style.display='none';">
        <div>
          <div class="eyebrow">PAINEL DE METAS · C/ MULTIPLICADOR</div>
          <h1>Meta diária por Closer e SDR</h1>
        </div>
      </div>
      <div class="meta">
        Corte 40%: dia ${m.corte40.dia}/${String(m.corte40.mes).padStart(2,"0")}
        ${m.corte40.vencido ? '<span class="venc">(vencido)</span>' : `· ${m.corte40.dias_uteis_restantes} DU restantes`}<br>
        <b>Corte 100%: dia ${m.corte100.dia}/${String(m.corte100.mes).padStart(2,"0")} · ${m.corte100.dias_uteis_restantes} DU restantes</b>
      </div>
    </div>

    ${alerta ? `
    <div class="alert-banner ${nivelClass}">
      <div class="alert-title">${alerta.titulo}</div>
      <div class="alert-detail">${alerta.detalhe}</div>
    </div>` : ""}

    <div class="metas-grid">
      <div class="metas-col">
        <h2>SDRs — Reuniões/dia (Sniper)</h2>
        <table class="metas-table">
          <thead><tr><th>SDR</th><th>Líder</th><th>Valid.</th><th>40% (${m.corte40.dias_uteis_restantes}d)</th><th>100% (${m.corte100.dias_uteis_restantes}d)</th></tr></thead>
          <tbody>${m.sdrs.map(sdrMetaRowHTML).join("")}</tbody>
        </table>
        <div class="metas-footer">
          ${gruposHTML}${gruposHTML && headHTML ? " · " : ""}${headHTML}
        </div>
        <div class="metas-total">
          <span>TOTAL SDR (${m.sdr_total.qtd}) · Valid. ${m.sdr_total.validadas}</span>
          <span class="num">${m.sdr_total.req40}/dia</span>
          <span class="num dim-cell">${m.sdr_total.req100}/dia</span>
        </div>
      </div>

      <div class="metas-col">
        <h2>Closers — R$/dia c/ multiplicador</h2>
        <table class="metas-table">
          <thead><tr><th>Closer</th><th>Sq</th><th>c/ Multi</th><th>40% (${m.corte40.dias_uteis_restantes}d)</th><th>100% (${m.corte100.dias_uteis_restantes}d)</th></tr></thead>
          <tbody>${m.closers.map(closerMetaRowHTML).join("")}</tbody>
        </table>
      </div>
    </div>
  `;
}

let lastData = null;
let currentPage = 0;
const PAGES = [renderRitmo, renderMetas];
const PAGE_NAMES = ["Ritmo do Dia", "Painel de Metas"];
const CAROUSEL_MS = 200000000; // 15s por página
let carouselTimer = null;

function renderPage(){
  if (!lastData) return;
  PAGES[currentPage](lastData);
  renderNavDots();
}

function renderNavDots(){
  let nav = document.getElementById("nav-dots");
  if (!nav){
    nav = document.createElement("div");
    nav.id = "nav-dots";
    nav.className = "nav-dots";
    document.body.appendChild(nav);
  }
  nav.innerHTML = PAGES.map((_, i) =>
    `<button class="dot ${i === currentPage ? 'active' : ''}" data-page="${i}" title="${PAGE_NAMES[i]}"></button>`
  ).join("");
  nav.querySelectorAll(".dot").forEach(btn => {
    btn.onclick = (e) => { e.stopPropagation(); goToPage(parseInt(btn.dataset.page, 10)); };
  });
}

function goToPage(n){
  currentPage = ((n % PAGES.length) + PAGES.length) % PAGES.length;
  renderPage();
  resetCarousel();
}

function resetCarousel(){
  if (carouselTimer) clearInterval(carouselTimer);
  carouselTimer = setInterval(() => goToPage(currentPage + 1), CAROUSEL_MS);
}

// Clique/toque em qualquer lugar da tela avança pra próxima página manualmente
document.addEventListener("click", (e) => {
  if (e.target.closest(".dot")) return; // já tratado no próprio botão
  goToPage(currentPage + 1);
});
// Setas do teclado, pra quem tiver controle remoto ou teclado ligado na TV
document.addEventListener("keydown", (e) => {
  if (e.key === "ArrowRight" || e.key === " ") goToPage(currentPage + 1);
  if (e.key === "ArrowLeft") goToPage(currentPage - 1);
});

async function load(){
  try{
    const resp = await fetch(API_URL);
    if (!resp.ok) throw new Error("HTTP " + resp.status);
    const data = await resp.json();
    if (data.erro) throw new Error(data.erro);
    lastData = data;
    renderPage();
  }catch(err){
    document.getElementById("app").innerHTML =
      `<div class="error">Erro ao carregar painel: ${err.message}. Tentando de novo em ${REFRESH_MS/1000}s…</div>`;
    console.error(err);
  }
}

load();
setInterval(load, REFRESH_MS);
resetCarousel();
</script>
</body>
</html>
